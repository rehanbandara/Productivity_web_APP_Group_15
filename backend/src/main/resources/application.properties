# ===============================
# Database Configuration (MySQL)
# ===============================

# JDBC URL for your MySQL database
spring.datasource.url=jdbc:mysql://localhost:3306/productivity_db

# Database username
spring.datasource.username=root

# Database password
spring.datasource.password=12345678

# (Optional but recommended) MySQL driver class name
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate Configuration
# ===============================

# Automatically update database schema based on JPA entities
# Options: none, validate, update, create, create-drop
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in the console (useful for debugging)
spring.jpa.show-sql=true

# Format SQL queries for readability
spring.jpa.properties.hibernate.format_sql=true

# Disable open-in-view warning (recommended for APIs)
spring.jpa.open-in-view=false

# Dialect helps Hibernate generate SQL for MySQL
# (You can remove this later; Spring Boot usually detects it automatically)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# Server Configuration
# ===============================

server.port=8080

# ===============================
# Logging Configuration (Optional)
# ===============================

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE