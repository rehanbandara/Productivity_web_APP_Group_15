# Application
spring.application.name=smart-campus-api
server.port=8080

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/smart_campus_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Example@2022#
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# File Upload (for Module C attachments)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

# JWT
jwt.secret=smartcampus2026supersecretkey1234567890abcdefgh
jwt.expiration=86400000

# Google OAuth2 (you will fill these in later - leave placeholder for now)
spring.security.oauth2.client.registration.google.client-id=YOUR_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile
spring.profiles.active=local



# Member 3 - Incident Ticket image upload folder
app.upload.dir=uploads/tickets


