
spring.application.name=productivity-backend
server.port=${APP_PORT:8080}

spring.datasource.url=jdbc:mysql://${APP_DB_HOST:localhost}:${APP_DB_PORT:3306}/${APP_DB_NAME:productivity_db}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${APP_DB_USERNAME:root}
spring.datasource.password=${APP_DB_PASSWORD:Example@2022#}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${APP_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${APP_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

logging.level.org.hibernate.SQL=${APP_LOG_SQL:DEBUG}
logging.level.org.hibernate.orm.jdbc.bind=${APP_LOG_SQL_BIND:TRACE}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

