# ===============================
# Database Configuration (MySQL)
# ===============================

# JDBC URL for your MySQL database
spring.datasource.url=jdbc:mysql://localhost:3306/productivity_db?createDatabaseIfNotExist=true

# Database username
spring.datasource.username=root

# Database password
spring.datasource.password=16667

# (Optional but recommended) MySQL driver class name
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate Configuration
# ===============================

# Automatically update database schema based on JPA entities
# Options: none, validate, update, create, create-drop
spring.jpa.hibernate.ddl-auto=validate

# Show SQL queries in the console (useful for debugging)
spring.jpa.show-sql=true

# Format SQL queries for readability
spring.jpa.properties.hibernate.format_sql=true

# Disable open-in-view warning (recommended for APIs)
spring.jpa.open-in-view=false

# Dialect helps Hibernate generate SQL for MySQL
# (You can remove this later; Spring Boot usually detects it automatically)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Skip foreign key constraint validation temporarily to handle orphaned records
spring.jpa.properties.hibernate.check_nullability=false
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=false
spring.jpa.properties.hibernate.order_inserts=false

# ===============================
# Server Configuration
# ===============================

server.port=8080

# ===============================
# JWT Configuration
# ===============================

# JWT secret key (should be a long, random string in production)
jwt.secret=mySecretKeyForJWTTokenGenerationAndValidation

# JWT token expiration time in milliseconds (24 hours)
jwt.expiration=86400000

# ===============================
# Logging Configuration (Optional)
# ===============================

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
